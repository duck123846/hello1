<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湯川秀樹：探求者的思緒</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* ==========================================
           1. 核心風格與 3D 畫布
           ========================================== */
        body {
            margin: 0; padding: 0; background-color: #05070b; color: #cbd5e1;
            font-family: 'Noto Serif TC', serif; display: flex; justify-content: center;
            align-items: center; min-height: 100vh; overflow: hidden; position: relative;
        }

        #webgl-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

        /* ==========================================
           2. 互動主卡片（優化手機排版）
           ========================================== */
        .game-container {
            width: 92%; max-width: 580px; background: rgba(10, 15, 24, 0.82);
            backdrop-filter: blur(12px); border: 1px solid rgba(212, 163, 89, 0.3);
            border-radius: 16px; padding: 35px 25px; box-shadow: 0 25px 55px rgba(0, 0, 0, 0.8);
            transition: all 0.4s ease; z-index: 10; position: relative; max-height: 90vh; overflow-y: auto;
        }

        .fade { opacity: 0; transform: translateY(10px); }
        .show { opacity: 1; transform: translateY(0); }

        .gold-glow-title {
            font-size: 28px; font-weight: 700; background: linear-gradient(to bottom, #fff6df 0%, #f3cc83 50%, #d4a359 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(212, 163, 89, 0.4));
            margin-bottom: 20px; line-height: 1.4; text-align: center;
        }

        .question-text { font-size: 18px; line-height: 1.7; margin-bottom: 25px; color: #f1f5f9; text-align: left; }

        .btn {
            display: block; width: 100%; padding: 15px 20px; margin-bottom: 12px;
            background-color: rgba(16, 24, 41, 0.85); border: 1px solid rgba(212, 163, 89, 0.25);
            border-radius: 8px; color: #e2e8f0; font-size: 15px; cursor: pointer; transition: 0.2s;
        }
        .btn:hover { border-color: #f3cc83; background-color: rgba(24, 37, 64, 0.95); transform: translateX(5px); }

        .btn-center {
            text-align: center; background: linear-gradient(135deg, #f3cc83 0%, #d4a359 100%);
            color: #05070b; font-weight: 700; border: none; margin-top: 15px;
        }
        
        /* 結局下方的特殊按鈕 */
        .btn-theory {
            background-color: rgba(142, 148, 242, 0.15); border: 1px solid rgba(142, 148, 242, 0.4);
            color: #8e94f2; margin-top: 10px;
        }
        .btn-theory:hover { background-color: rgba(142, 148, 242, 0.3); color: #fff; }

        /* ==========================================
           3. 介子理論小劇場動畫 (Meson Animation)
           ========================================== */
        #theory-view { display: none; text-align: center; }

        .atom-nucleus {
            position: relative; width: 200px; height: 150px; margin: 30px auto;
            background: radial-gradient(circle, rgba(142,148,242,0.05) 0%, transparent 70%);
        }

        /* 質子與中子 */
        .particle {
            position: absolute; width: 40px; height: 40px; border-radius: 50%;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5), 0 0 15px rgba(255,255,255,0.1);
        }
        .proton { background: radial-gradient(circle at 30% 30%, #ff5f5f, #8b0000); left: 40px; top: 50px; }
        .neutron { background: radial-gradient(circle at 30% 30%, #5fafff, #003366); right: 40px; top: 50px; }

        /* 介子：在兩者間高速彈跳 */
        .meson {
            position: absolute; width: 12px; height: 12px; background: #f3cc83;
            border-radius: 50%; top: 64px; left: 94px;
            box-shadow: 0 0 15px #f3cc83, 0 0 30px #f3cc83;
            animation: exchange 0.6s infinite ease-in-out;
        }

        @keyframes exchange {
            0%, 100% { transform: translateX(-40px) scale(1.2); }
            50% { transform: translateX(40px) scale(0.8); }
        }

        .theory-p { font-size: 15px; color: #94a3b8; line-height: 1.8; text-align: justify; margin-top: 20px; }

        @media (max-width: 480px) {
            .gold-glow-title { font-size: 22px; }
            .game-container { padding: 25px 20px; }
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="game-container show" id="game-card">
        </div>

    <script>
        // 1. 劇情資料庫
        const storyData = {
            "cover": {
                isCover: true,
                title: "「一隅之光，普照世界——<br>從介子理論看萬物聯繫」",
                subtitle: "湯川秀樹 · 探求者的思緒生平分支遊戲",
                next: "1"
            },
            "1": {
                text: "【第 1 題】你出生在富裕家庭裡過著優渥的生活，今天你的早餐想吃：",
                image: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=600&q=80",
                options: [
                    { text: "A. 進進堂的麵包配上冰咖啡", next: "2" },
                    { text: "B. 土鍋炊飯配上紅味噌湯", next: "2" }
                ]
            },
            "2": {
                text: "【第 2 題】今天在學校唸書，發現書包裡還有空間，你打算帶著：",
                options: [
                    { text: "A. 最新一期泰晤士報", next: "3" },
                    { text: "B. 一小盒和菓子", next: "3" }
                ]
            },
            "3": {
                text: "【第 3 題：命運分界】走在京都的長廊上，你看著遠方的天際線，內心深處最渴望探求的是？",
                options: [
                    { text: "A. 物質世界底層的物理定理與真實", next: "4_main" },
                    { text: "B. 人與人之間感性交織的文學篇章", next: "4_branch3" }
                ]
            },
            // ... (其餘題目邏輯維持不變)
            "4_main": { text: "你快要遲到了，在趕去上學路上遇到了一隻貓咪：", options: [{ text: "A. 不理它", next: "5_main" }, { text: "B. 有貓就要摸", next: "5_main" }] },
            "5_main": { text: "你經歷了努力，考上京都帝國大學物理學系。路過喫茶館，你點了：", options: [{ text: "A. 濃郁醇香的抹茶", next: "6_main" }, { text: "B. 夢幻冰淇淋蘇打", next: "6_main" }] },
            "6_main": { text: "深入研究物理後，前方的學術道路出現了分歧：", options: [{ text: "A. 堅持走純粹的理論物理", next: "7_main" }, { text: "B. 轉向動手做實驗與應用", next: "7_branch6" }] },
            "7_main": { text: "1932年，你與湯川澄子結婚。在婚禮上，你們打算穿著：", options: [{ text: "A. 傳統日式白無垢", next: "8_main" }, { text: "B. 西式蕾絲白紗", next: "8_main" }] },
            "8_main": { text: "你擔任教授。回家路上雨下很大，你會：", options: [{ text: "A. 搭電車回家", next: "9_main" }, { text: "B. 住在實驗室裡", next: "9_main" }] },
            "9_main": { text: "深夜你正在推導核力公式，這時你突然想到了：", options: [{ text: "A. 預言未知微觀粒子（介子）", next: "10_main" }, { text: "B. 科學與世界和平的平衡", next: "10_main" }] },
            "10_main": { text: "今天特別閒，打算跟妻子湯川澄子來場約會：", options: [{ text: "A. 去百貨公司逛衣服", next: "endingA" }, { text: "B. 到鴨川河畔看夕陽", next: "endingA" }] },
            
            "7_branch6": { text: "今天實驗做到爆肝，你打算：", options: [{ text: "A. 喝咖啡趕進度", next: "8_branch6" }, { text: "B. 直接睡實驗室", next: "8_branch6" }] },
            "8_branch6": { text: "畢業了，站在人生交叉路口，你打算：", options: [{ text: "A. 投身機械工業", next: "9_branch6" }, { text: "B. 繼續攻讀博士", next: "9_branch6" }] },
            "9_branch6": { text: "婚禮上，你們打算穿著：", options: [{ text: "A. 傳統日式白無垢", next: "10_branch6" }, { text: "B. 西式蕾絲白紗", next: "10_branch6" }] },
            "10_branch6": { text: "約會地點，你選擇：", options: [{ text: "A. 百貨公司", next: "endingC" }, { text: "B. 鴨川河畔", next: "endingC" }] },

            "4_branch3": { text: "快遲到了，遇到一隻可愛的貓咪：", options: [{ text: "A. 不理它", next: "5_branch3" }, { text: "B. 有貓就要摸", next: "5_branch3" }] },
            "5_branch3": { text: "路過新開的喫茶館，你點了：", options: [{ text: "A. 濃郁抹茶", next: "6_branch3" }, { text: "B. 夢幻蘇打", next: "6_branch3" }] },
            "6_branch3": { text: "在選擇大學專業時，你攻讀：", options: [{ text: "A. 西洋文化學系", next: "7_branch3" }, { text: "B. 基礎現代文學", next: "7_branch3" }] },
            "7_branch3": { text: "與心儀女子結婚，婚禮穿著：", options: [{ text: "A. 日式白無垢", next: "8_branch3" }, { text: "B. 西式蕾絲白紗", next: "8_branch3" }] },
            "8_branch3": { text: "大學畢業後，打算成為：", options: [{ text: "A. 作家", next: "9_branch3" }, { text: "B. 未來成為教授", next: "9_branch3" }] },
            "9_branch3": { text: "搭電車回家，心裡想著：", options: [{ text: "A. 明天早餐吃什麼", next: "10_branch3" }, { text: "B. 要不要去喝杯酒", next: "10_branch3" }] },
            "10_branch3": { text: "說走就走的約會：", options: [{ text: "A. 逛百貨公司", next: "endingD" }, { text: "B. 到鴨川看夕陽", next: "endingD" }] }
        };

        const endings = {
            "endingA": { title: "【結局 A：介子之父】", image: "S__81813525.jpg", text: "你完美複製了湯川秀樹的傳奇人生。你在 1935 年提出了介子理論，並獲得了首個諾貝爾物理學獎。" },
            "endingC": { title: "【結局 C：工業領袖】", image: "S__81813523.jpg", text: "你轉向了具實作價值的精密機械。憑藉紮實科學底蘊，帶領戰後日本工業走向現代化。" },
            "endingD": { title: "【結局 D：京都文豪】", image: "S__81813522.jpg", text: "你走向了感性世界。以筆觸描寫京都的四季，成為了昭和時代著名的傳奇文豪。" }
        };

        let currentNode = "cover";

        function renderGame() {
            const container = document.getElementById('game-card');
            container.classList.remove('show'); container.classList.add('fade');

            setTimeout(() => {
                if (endings[currentNode]) {
                    const end = endings[currentNode];
                    container.innerHTML = `
                        <div class="gold-glow-title">${end.title}</div>
                        <img class="quiz-image" src="${end.image}" style="display:block;">
                        <div class="ending-text">${end.text}</div>
                        <button class="btn btn-center btn-theory" onclick="showTheory()">✨ 了解湯川的介子理論</button>
                        <button class="btn btn-center" onclick="location.reload()">重新探索人生</button>
                    `;
                } 
                else if (storyData[currentNode]?.isCover) {
                    const cover = storyData[currentNode];
                    container.innerHTML = `
                        <div class="gold-glow-title">${cover.title}</div>
                        <div class="cover-subtitle">${cover.subtitle}</div>
                        <button class="btn btn-center" onclick="changeNode('${cover.next}')">開始旅程</button>
                    `;
                }
                else {
                    const node = storyData[currentNode];
                    let imgHtml = node.image ? `<img class="quiz-image" src="${node.image}" style="display:block;">` : "";
                    let optionsHtml = node.options.map(opt => `<button class="btn" onclick="changeNode('${opt.next}')">${opt.text}</button>`).join("");
                    container.innerHTML = `${imgHtml}<div class="question-text">${node.text}</div><div>${optionsHtml}</div>`;
                }
                container.classList.remove('fade'); container.classList.add('show');
            }, 300);
        }

        function changeNode(n) { currentNode = n; renderGame(); }

        // ==========================================
        // 4. 科普劇場：介子理論動畫功能
        // ==========================================
        function showTheory() {
            const container = document.getElementById('game-card');
            container.classList.remove('show'); container.classList.add('fade');
            
            setTimeout(() => {
                container.innerHTML = `
                    <div id="theory-view" style="display:block;">
                        <div class="gold-glow-title">介子理論：萬物的聯繫</div>
                        <div class="atom-nucleus">
                            <div class="particle proton"></div>
                            <div class="particle neutron"></div>
                            <div class="meson"></div>
                        </div>
                        <p class="theory-p">
                            為什麼原子核裡的質子（帶正電）不會因為電性相斥而炸開？<br><br>
                            湯川秀樹預言：質子與中子之間，像是在「接球」一樣，高速交換著一種神祕粒子——<b>「介子」</b>。這種接球產生的力，比電磁力強上百倍，將世界微觀的基礎緊緊扣在一起。
                        </p>
                        <button class="btn btn-center" style="margin-top:30px;" onclick="renderGame()">返回結局</button>
                    </div>
                `;
                container.classList.remove('fade'); container.classList.add('show');
            }, 300);
        }

        // ==========================================
        // 5. 3D 量子空間渲染引擎
        // ==========================================
        let scene, camera, renderer, particleSystem;
        let mouseX = 0, mouseY = 0;

        function init3D() {
            const canvas = document.getElementById('webgl-canvas');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 160;
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const particleCount = 1800;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount * 3; i++) positions[i] = (Math.random() - 0.5) * 350;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ color: 0xf3cc83, size: 1.6, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending });
            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            document.addEventListener('mousemove', e => { mouseX = (e.clientX - window.innerWidth / 2) * 0.08; mouseY = (e.clientY - window.innerHeight / 2) * 0.08; });
            document.addEventListener('touchmove', e => { if(e.touches.length > 0) { mouseX = (e.touches[0].clientX - window.innerWidth / 2) * 0.08; mouseY = (e.touches[0].clientY - window.innerHeight / 2) * 0.08; }});
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            particleSystem.rotation.y += 0.0008;
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);
            renderer.render(scene, camera);
        }

        window.onload = () => { renderGame(); init3D(); };
    </script>
</body>
</html>
