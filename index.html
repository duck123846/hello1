<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湯川秀樹：探求者的思緒</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 高級感極簡暗黑風格設計 */
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f12; /* 純粹暗黑基底 */
            color: #e2e8f0;
            font-family: 'Noto Serif TC', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 遊戲主卡片 */
        .game-container {
            width: 100%;
            max-width: 580px;
            background-color: #17171c; /* 內斂黑灰色 */
            border: 1px solid #26262b;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            transition: opacity 0.3s ease, transform 0.3s ease;
            box-sizing: border-box;
        }

        /* 轉場動畫樣式 */
        .fade { opacity: 0; transform: translateY(8px); }
        .show { opacity: 1; transform: translateY(0); }

        /* 封面佈局 */
        .cover-view {
            text-align: center;
            padding: 30px 0;
        }
        .cover-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #ffffff;
            margin-bottom: 16px;
        }
        .cover-subtitle {
            font-size: 16px;
            color: #8e94a1;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* 圖片放置槽 */
        .quiz-image {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 24px;
            border: 1px solid #26262b;
            display: none; /* 預設隱藏，有圖片時會自動顯示 */
        }

        /* 題目內文 */
        .question-text {
            font-size: 19px;
            line-height: 1.7;
            margin-bottom: 28px;
            color: #f1f5f9;
            text-align: left;
        }

        /* 二選一選項按鈕 */
        .btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 14px;
            background-color: #202026;
            border: 1px solid #2d2d35;
            border-radius: 6px;
            color: #cbd5e1;
            font-size: 16px;
            font-family: 'Noto Serif TC', serif;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: #262630;
            border-color: #8e94f2;
            color: #ffffff;
            transform: translateX(4px);
        }

        /* 主動型中心按鈕（封面與結局用） */
        .btn-center {
            text-align: center;
            background-color: #8e94f2;
            color: #0f0f12;
            font-weight: 700;
            border: none;
            margin: 20px auto 0;
            max-width: 200px;
        }
        .btn-center:hover {
            background-color: #767bc7;
            color: #ffffff;
            transform: scale(1.03);
        }

        /* 結局專用樣式 */
        .ending-title {
            font-size: 24px;
            font-weight: 700;
            color: #8e94f2;
            margin-bottom: 20px;
            text-align: center;
        }
        .ending-text {
            font-size: 16px;
            line-height: 1.8;
            color: #94a3b8;
            text-align: justify;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="game-container show" id="game-card">
        </div>

    <script>

            // 共通主線

                image: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=600&q=80", // 這裡示範放圖片，不想要可以改成 ""
                options: [
                    { text: "A. 進進堂的麵包配上冰咖啡", next: "2" },

                ]
            },
            "2": {
                text: "今天在學校唸書，發現書包裡還有空間，你打算帶著：",

                    { text: "A. 最新一期泰晤士報", next: "3" },

            "3": {

                    { text: "A. 物質世界底層的物理定理與真實", next: "4_main" }, // 往物理主線前進

                ]
            },

            // ==========================================
            // PATH 1：物理學系主線 (Q4_main ~ Q6_main)
            // ==========================================
            "4_main": {
                text: "你快要遲到了，在趕去上學路上遇到了一隻貓咪，你打算：",
                image: "",
                options: [
                    { text: "A. 不理它", next: "5_main" },
                    { text: "B. 有貓就要摸", next: "5_main" }

            },
            "5_main": {
                text: "你經歷了許多曲折及努力，最終考上京都帝國大學物理學系。放學路上途經新開的喫茶館，於是你打算進去試試口味。你看了菜單，打算要點：",

            "6_main": {

                    { text: "B. 轉向動手做實驗與應用科學", next: "7_branch6" } // 觸發【6.分界往下】

            // PATH 1-A：純理論物理路線 (Q7_main ~ Q10_main)

                ]
            },
            "8_main": {
                text: "你在32歲擔任擔任京都帝國大學教授。回家路上雨下很大，於是你打算：",
                image: "",
                options: [
                    { text: "A. 搭乘電車回家", next: "9_main" },
                    { text: "B. 住在實驗室裡", next: "9_main" }
                ]
            },
            "9_main": {
                text: "深夜的黑板前，你正在推導微觀粒子的核力公式，這時你突然想到了：",
                image: "",
                options: [
                    { text: "A. 預言未知微觀粒子（介子）的存在", next: "10_mainA" }, // 導向結局 A
                    { text: "B. 科學與世界和平之間的平衡關係", next: "10_mainB" }  // 導向結局 B
                ]
            },
            "10_mainA": {
                text: "今天特別閒，打算跟妻子湯川澄子來場說走就走的約會，你打算：",
                image: "",
                options: [
                    { text: "A. 跟妻子去百貨公司逛衣服", next: "endingA" },

                ]

            "10_mainB": {
                text: "今天特別閒，打算跟妻子湯川澄子來場說走就走的約會，你打算：",

                ]
            },

            // ==========================================
            // PATH 2：【6.分界往下】實作與爆肝實驗線
            // ==========================================
            "7_branch6": {
                text: "今天實驗做到爆肝，你打算：",

            "8_branch6": {
                text: "好不容易從京都帝國大學物理學系畢業了，你打算：",

                ]
            },
            "9_branch6": {
                text: "1932年，你與湯川澄子結婚。在婚禮上，你們打算穿著：",
                image: "",
                options: [
                    { text: "A. 傳統日式白無垢及黑紋付羽織袴", next: "10_branch6" },
                    { text: "B. 西式蕾絲白紗及三件式西裝", next: "10_branch6" }
                ]
            },
            "10_branch6": {
                text: "但今天特別閒，打算跟妻子湯川澄子來場說走就走的約會，你打算：",
                image: "",
                options: [
                    { text: "A. 跟妻子去百貨公司逛衣服", next: "endingC" },
                    { text: "B. 到鴨川河畔一起看夕陽", next: "endingC" }
                ]
            },

            // ==========================================
            // PATH 3：【3.分界往下】人文與文學路線
            // ==========================================
            "4_branch3": {
                text: "你快要遲到了，在趕去上學路上遇到了一隻貓咪，你打算：",
                image: "",
                options: [
                    { text: "A. 不理它", next: "5_branch3" },
                    { text: "B. 有貓就要摸", next: "5_branch3" }
                ]
            },
            "5_branch3": {
                text: "放學路上途經新開的喫茶館，於是你打算進去試試口味。你看了菜單，打算要點：",
                image: "",
                options: [
                    { text: "A. 濃郁醇香的抹茶", next: "6_branch3" },
                    { text: "B. 夢幻的冰淇淋蘇打", next: "6_branch3" }
                ]
            },
            "6_branch3": {
                text: "在選擇大學專業時，你選擇攻讀：",
                image: "",
                options: [
                    { text: "A. 西洋文化學系", next: "7_branch3" },
                    { text: "B. 基礎現代文學系", next: "7_branch3" }
                ]
            },
            "7_branch3": {
                text: "你與心儀已久的女子結婚。在婚禮上，你們打算穿著：",
                image: "",
                options: [
                    { text: "A. 傳統日式白無垢及黑紋付羽織袴", next: "8_branch3" },
                    { text: "B. 西式蕾絲白紗及三件式西裝", next: "8_branch3" }
                ]
            },
            "8_branch3": {
                text: "你從大學畢業，打算成為：",
                image: "",
                options: [
                    { text: "A. 作家", next: "9_branch3" },
                    { text: "B. 繼續鑽研，未來成為教授", next: "9_branch3" }
                ]
            },
            "9_branch3": {
                text: "你搭著路面電車回家，心裡在想著：",
                image: "",
                options: [
                    { text: "A. 明天早餐要吃什麼", next: "10_branch3" },
                    { text: "B. 等等要不要去喝個酒", next: "10_branch3" }
                ]
            },
            "10_branch3": {
                text: "今天特別閒，打算跟妻子來場說走就走的約會，你打算：",
                image: "",
                options: [
                    { text: "A. 跟妻子去百貨公司逛衣服", next: "endingD" },
                    { text: "B. 到鴨川河畔一起看夕陽", next: "endingD" }
                ]
            }
        };

        // 結局內容資料庫
        const endings = {
            "endingA": {
                title: "【結局 A：介子之父，真理的先驅者】",
                image:
                text: "你完美複製了湯川秀樹的傳奇人生。你在京都帝國大學深耕理論物理，於 1935 年提出了著名的介子理論，並在 1949 年獲得了日本首個諾貝爾物理學獎。你的名字將被永遠載入基礎物理科學的史冊中。"
            },
            "endingB": {
                title: "【結局 B：知性教授與和平使者】",
                image:"S__81813524.jpg",
                text: "你走上了純粹理論物理學家的道路，但比起名譽，你更關注人類社會的未來。後半生你積極投身於反核與世界和平運動，成為受人景仰的京都大學名譽教授，在科學與人道主義之間找到了完美的支點。"
            },
            "endingC": {
                title: "【結局 C：開創時代的工業領袖】",
                image:"S__81813523.jpg",
                text: "你從物理學系畢業後，轉向了更具實作價值的精密機械與工業技術。你憑藉著紮實的基礎科學底蘊，帶領戰後日本的機械工業走向現代化，成為了備受敬重的工業界巨擘與應用科學導師。"
            },
            "endingD": {
                title: "【結局 D：昭和浪漫的京都文豪】",
                image:"S_81813522.jpg",
                text: "你徹底離開了冷冰冰的公式，走向了充滿溫度的感性世界。你以細膩溫潤的筆觸描寫京都的四季、古都的街道與幽微的人心，成為了昭和時代著名的傳奇文豪。對你而言，生活與美學才是終極的真理。"
            }
        };

        let currentNode = "cover"; // 預設從封面頁開始

        function renderGame() {
            const container = document.getElementById('game-card');
            
            // 觸發滑動淡出效果
            container.classList.remove('show');
            container.classList.add('fade');

            setTimeout(() => {
// 1. 判斷是否為結局頁（修改後：支援秀出結局照片）
                if (endings[currentNode]) {
                    const end = endings[currentNode];
                    
                    // 建立結局圖片結構
                   // 修改後的結構：如果結尾是 .pdf，就用 iframe 讀取，否則用一般圖片標籤
let imgHtml = "";
if (end.image && end.image.toLowerCase().endsWith('.pdf')) {
    imgHtml = `<iframe id="quiz-pdf" class="quiz-image" src="${end.image}" style="width:100%; height:260px; border:none;"></iframe>`;
} else {
    imgHtml = `<img id="quiz-img" class="quiz-image" src="${end.image}" alt="結局畫面">`;
}
                    
                    container.innerHTML = `
                        ${imgHtml}
                        <div class="ending-title">${end.title}</div>
                        <div class="ending-text">${end.text}</div>
                        <button class="btn btn-center" onclick="location.reload()">重新探索人生</button>
                    `;

                    // 檢查結局是否有照片，有的話就大膽秀出來
                    const imgEl = document.getElementById('quiz-img');
                    if (end.image && end.image !== "") {
                        imgEl.style.display = "block";
                    } else {
                        imgEl.style.display = "none";
                    }
                }
                // 2. 判斷是否為封面頁
                else if (storyData[currentNode] && storyData[currentNode].isCover) {
                    const cover = storyData[currentNode];
                    container.innerHTML = `
                        <div class="cover-view">
                            <div class="cover-title">${cover.title}</div>
                            <div class="cover-subtitle">${cover.subtitle}</div>
                            <button class="btn btn-center" onclick="changeNode('${cover.next}')">開始旅程</button>
                        </div>
                    `;
                }
                // 3. 一般題目頁
                else if (storyData[currentNode]) {
                    const node = storyData[currentNode];
                    
                    // 建立圖片結構
                    let imgHtml = `<img id="quiz-img" class="quiz-image" src="${node.image}" alt="遊戲畫面">`;
                    
                    // 建立選項按鈕結構
                    let optionsHtml = "";
                    node.options.forEach(opt => {
                        optionsHtml += `<button class="btn" onclick="changeNode('${opt.next}')">${opt.text}</button>`;
                    });

                    container.innerHTML = `
                        ${imgHtml}
                        <div class="question-text">${node.text}</div>
                        <div>${optionsHtml}</div>
                    `;

                    // 如果這一題有設定圖片網址，就將其顯示，否則維持隱藏
                    const imgEl = document.getElementById('quiz-img');
                    if (node.image && node.image !== "") {
                        imgEl.style.display = "block";
                    } else {
                        imgEl.style.display = "none";
                    }
                }

                // 換完內文後，觸發滑動淡入
                container.classList.remove('fade');
                container.classList.add('show');
            }, 300); // 300毫秒的轉場緩衝
        }

        // 切換題目的核心函數
        function changeNode(nextNode) {
            currentNode = nextNode;
            renderGame();
        }

        // 初始化載入
        window.onload = renderGame;
    </script>
</body>
</html>
