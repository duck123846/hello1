<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* ==========================================
           1. 全域背景與滑動解鎖（徹底解決手機卡死）
           ========================================== */
        :root {
            --gold-light: #fff6df;
            --gold-main: #f3cc83;
            --gold-dark: #d4a359;
            --bg-deep: #05070b;
        }

        html, body {
            margin: 0; padding: 0; 
            background-color: var(--bg-deep);
            color: #cbd5e1; font-family: 'Noto Serif TC', serif;
            min-height: 100vh;
            /* 允許網頁本體自然長度捲動，解決結局頁面與劇場卡死的問題 */
            overflow-y: auto !important;
            scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }

        #webgl-canvas { 
            position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; z-index: 0; 
            pointer-events: none;
        }

        .main-wrapper {
            position: relative; z-index: 10;
            display: flex; justify-content: center;
            padding: 40px 0; /* 留出上下安全空間 */
        }

        /* ==========================================
           2. 講堂黑板卡片（古典金邊證書風格）
           ========================================== */
        .game-container {
            width: 92%; max-width: 680px; 
            background: rgba(12, 18, 28, 0.94);
            backdrop-filter: blur(15px);
            border-radius: 4px;
            padding: 55px 35px 65px 35px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.95), inset 0 0 40px rgba(212, 163, 89, 0.08);
            position: relative;
            text-align: center;
            border: 1px solid rgba(212, 163, 89, 0.25);
            transition: opacity 0.5s ease;
        }

        /* 幾何金色雙框 */
        .game-container::before {
            content: ""; position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid rgba(212, 163, 89, 0.15); pointer-events: none;
        }

        /* 古典裝飾角 */
        .corner {
            position: absolute; width: 25px; height: 25px;
            border: 2px solid var(--gold-main); pointer-events: none;
        }
        .tl { top: 30px; left: 30px; border-right: 0; border-bottom: 0; }
        .tr { top: 30px; right: 30px; border-left: 0; border-bottom: 0; }
        .bl { bottom: 30px; left: 30px; border-right: 0; border-top: 0; }
        .br { bottom: 30px; right: 30px; border-left: 0; border-top: 0; }

        /* ==========================================
           3. 核心轉場：135度斜向板擦擦除、強粒子粉筆書寫
           ========================================== */
        .board-fade-out { opacity: 0; }
        .board-fade-in { opacity: 1; }

        /* 粉筆粒子一筆一畫凝聚效果 */
        .chalk-word {
            display: inline-block; position: relative;
            opacity: 0; transform: scale(0.9);
            filter: blur(6px); /* 增強粉筆顆粒感的霧化濾鏡 */
            animation: chalk-render 0.5s forwards cubic-bezier(0.12, 0.8, 0.3, 1);
        }
        @keyframes chalk-render {
            0% { opacity: 0; filter: blur(6px); transform: scale(0.9) translate(-4px, -4px); }
            50% { opacity: 0.7; filter: blur(1.5px); text-shadow: 0 0 8px white; }
            100% { opacity: 1; filter: blur(0px); transform: scale(1) translate(0, 0); }
        }

        /* 135度左斜上往右斜下板擦橫掃特效 */
        .board-wiper { position: relative; overflow: hidden; }
        .board-wiper::after {
            content: ""; position: absolute;
            top: -100%; left: -200%; width: 300%; height: 300%;
            background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.08) 40%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0.1) 60%, transparent 100%);
            transition: left 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none; z-index: 99;
        }
        .board-wiper.wiping::after { left: 150%; }

        /* ==========================================
           4. 圖片與文字風格（修復圖片分離感）
           ========================================== */
        .gold-glow-title {
            font-size: 30px; font-weight: 900; 
            background: linear-gradient(to bottom, var(--gold-light) 0%, var(--gold-main) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(212, 163, 89, 0.45));
            margin-bottom: 25px; line-height: 1.5;
        }

        .cover-subtitle {
            font-size: 16px; color: #94a3b8; letter-spacing: 2px; margin-bottom: 45px;
        }
        .cover-subtitle::after {
            content: ""; display: block; width: 60px; height: 1px; background: var(--gold-dark); margin: 15px auto 0; opacity: 0.5;
        }

        .question-text {
            font-size: 19px; line-height: 1.8; margin-bottom: 35px;
            color: #f1f5f9; font-weight: 500; text-align: justify;
        }

        .image-wrapper { 
            width: 100%; margin-bottom: 30px; display: flex; justify-content: center;
        }
        /* 融合強化濾鏡：讓圖片邊緣自然壓黑、壓低亮度，融入黑板 */
        .quiz-image {
            max-width: 100%; max-height: 210px; object-fit: cover; border-radius: 2px;
            border: 1px solid rgba(243, 204, 131, 0.25);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.9), 0 15px 30px rgba(0, 0, 0, 0.8);
            filter: brightness(0.88) contrast(1.05); /* 微光投射質感 */
            display: none;
        }

        /* ==========================================
           5. 2B鉛筆重力劃記（高顯性光圈慢慢散播）
           ========================================== */
        .btn-group { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 14px; }

        .btn {
            width: 100%; max-width: 500px; padding: 16px 22px;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 163, 89, 0.25);
            border-radius: 4px; color: var(--gold-light);
            font-size: 15px; font-family: 'Noto Serif TC', serif;
            cursor: pointer; transition: background-color 0.2s, border-color 0.2s;
            display: flex; align-items: center; gap: 16px; line-height: 1.5;
            text-align: left;
        }

        /* 試卷填空框 [ ] */
        .sheet-box {
            width: 24px; height: 16px; border: 2px solid var(--gold-main);
            position: relative; flex-shrink: 0; background: rgba(0,0,0,0.3); overflow: hidden;
        }

        /* 鉛筆濃黑石墨粉末：從左上往右下延伸 */
        .sheet-box::before {
            content: ""; position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #121218;
            box-shadow: inset 0 0 8px #000;
            transform: translate(-100%, -100%) rotate(45deg);
            transition: transform 0.45s cubic-bezier(0.1, 0.8, 0.25, 1);
        }

        /* 劃記被點選時的強顯性高亮效果 */
        .btn.selected .sheet-box::before { transform: translate(0, 0) rotate(0deg); }
        .btn.selected .sheet-box::after {
            content: "■"; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scaleX(1.5);
            color: #f5cc84; font-size: 20px; opacity: 1;
            text-shadow: 0 0 6px var(--gold-main);
            transition: opacity 0.2s ease 0.25s;
        }
        .btn.selected .sheet-box {
            border-color: #ffffff;
            box-shadow: 0 0 15px var(--gold-main); /* 金色反光光圈 */
        }
        .btn.selected { background-color: rgba(212, 163, 89, 0.08); border-color: #ffffff; }
        .btn:hover:not(.selected) { background: rgba(212, 163, 89, 0.08); border-color: var(--gold-main); }

        /* 置中控制與劇場按鈕 */
        .btn-center {
            justify-content: center; text-align: center;
            background: linear-gradient(135deg, var(--gold-main) 0%, var(--gold-dark) 100%);
            color: #05070b; font-weight: 700; border: none; margin: 15px auto; max-width: 220px;
        }
        .btn-center:hover { filter: brightness(1.1); transform: scale(1.03); color: #05070b; }
        .btn-theory {
            background: rgba(142, 148, 242, 0.15); border: 1px solid rgba(142, 148, 242, 0.5);
            color: #8e94f2; justify-content: center; max-width: 280px;
        }
        .btn-theory:hover { background-color: rgba(142, 148, 242, 0.3); color: #fff; }

        .ending-text { font-size: 16px; line-height: 1.9; color: #cbd5e1; text-align: justify; margin-bottom: 30px; }

        /* ==========================================
           6. 介子理論大眾科普劇場（接球機制）
           ========================================== */
        #theory-view { display: none; text-align: center; }
        .game-of-catch {
            position: relative; width: 100%; height: 160px; margin: 30px 0;
            display: flex; justify-content: center; align-items: center;
        }
        .player {
            width: 60px; height: 60px; border-radius: 50%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; font-size: 12px; font-weight: 700; color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .player-p { background: #ff4d4d; position: absolute; left: 15%; }
        .player-n { background: #4d94ff; position: absolute; right: 15%; }
        .meson-ball {
            width: 18px; height: 18px; background: var(--gold-main); border-radius: 50%;
            box-shadow: 0 0 20px var(--gold-main); position: absolute; z-index: 5;
            animation: catch-game 0.8s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }
        @keyframes catch-game {
            0%, 100% { left: calc(15% + 50px); transform: scale(1.3); }
            50% { left: calc(85% - 68px); transform: scale(0.8); }
        }
        .repel-wave {
            position: absolute; width: 100px; height: 100px; border: 1px solid rgba(255, 77, 77, 0.3);
            border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        .theory-desc { font-size: 16px; color: #cbd5e1; line-height: 1.8; text-align: left; }
        .highlight-text { color: var(--gold-main); font-weight: 700; border-bottom: 1px dashed var(--gold-main); }

        @media (max-width: 480px) {
            .gold-glow-title { font-size: 24px; }
            .game-container { padding: 40px 20px 45px 20px; }
            .corner { width: 15px; height: 15px; }
            .question-text { font-size: 17px; }
            .btn { font-size: 14px; padding: 14px 16px; }
        }
    </style>
</head>

            "endingC": { title: "【結局 C：開創時代的工業領袖】", image: "S__81813523.jpg", text: "你從物理學系畢業後，轉向了更具實作價值的精密機械與工業技術。你憑藉著紮實的基礎科學底子與嚴謹的邏輯思維，帶領戰後日本的機械工業走向現代化與國際舞台，成為了備受敬重的工業界巨擘與應用科學導師。" },
            "endingD": { title: "【結局 D：昭和浪漫的京都文豪】", image: "S__81813522.jpg", text: "你徹底離開了冷冰冰的公式，走向了充滿溫度的感性世界。你以細膩溫潤的筆觸描寫京都的四季、古都的街道與幽微的人心，成為了昭和時代著名的傳奇文豪。對你而言，生活、文字與美學才是探求世界的終極真理。" }
        };

        let currentNode = "cover";

        // ==========================================
        // 2. 核心功能：強粒子斜向粉筆一筆一畫書寫
        // ==========================================
        function executeChalkWritter(fullText, containerId, callback) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            const characters = fullText.split("");
            characters.forEach((char, index) => {
                const span = document.createElement("span");
                span.className = "chalk-word";
                span.style.animationDelay = `${index * 35}ms`; /* 一筆一畫微觀粉筆摩擦延時 */
                if (char === "\n") {
                    container.appendChild(document.createElement("br"));
                } else {
                    span.innerText = char;
                    container.appendChild(span);
                }
            });
            setTimeout(() => { if (callback) callback(); }, characters.length * 35 + 500);
        }

        // 135度左斜上往右斜下板擦擦拭轉場
        function boardEraserTransition(renderCallback) {
            const card = document.getElementById('game-card');
            card.classList.add('wiping');
            card.classList.remove('board-fade-in');
            card.classList.add('board-fade-out');

            setTimeout(() => {
                renderCallback();
                card.classList.remove('wiping');
                card.classList.remove('board-fade-out');
                card.classList.add('board-fade-in');
            }, 700); 
        }

        function renderGame() {
            const content = document.getElementById('card-content');
            if (endings[currentNode]) {
                const end = endings[currentNode];
                content.innerHTML = `
                    <div class="ending-title">${end.title}</div>
                    <div class="image-wrapper"><img src="${end.image}" style="display:block;" class="quiz-image"></div>
                    <div class="ending-text" id="chalk-box"></div>
                    <div class="btn-group" id="end-btns" style="opacity:0; transition:opacity 0.6s; padding-bottom:15px;">
                        <button class="btn btn-center btn-theory" onclick="showTheory()">✨ 30秒看懂：什麼是介子理論？</button>
                        <button class="btn btn-center" onclick="location.reload()">重新探索人生</button>
                    </div>
                `;
                executeChalkWritter(end.text, "chalk-box", () => document.getElementById('end-btns').style.opacity = "1");
            } 
            else if (storyData[currentNode]?.isCover) {
                const cover = storyData[currentNode];
                content.innerHTML = `
                    <div class="gold-glow-title">${cover.title}</div>
                    <div class="cover-subtitle">${cover.subtitle}</div>
                    <button class="btn btn-center" onclick="changeNode('${cover.next}')">開啟探索旅程</button>
                `;
            }
            else {
                const node = storyData[currentNode];
                let imgHtml = node.image ? `<div class="image-wrapper"><img class="quiz-image" src="${node.image}" style="display:block;"></div>` : "";
                let btns = node.options.map((o, idx) => `
                    <button class="btn" id="opt-${idx}" onclick="selectOption('opt-${idx}', '${o.next}')">
                        <div class="sheet-box"></div>
                        <div>${o.text}</div>
                    </button>
                `).join("");
                content.innerHTML = `${imgHtml}<div class="question-text" id="chalk-box"></div><div class="btn-group" id="quiz-btns" style="opacity:0; transition:opacity 0.6s;">${btns}</div>`;
                executeChalkWritter(node.text, "chalk-box", () => document.getElementById('quiz-btns').style.opacity = "1");
            }
        }

        function selectOption(btnId, nextNode) {
            document.getElementById(btnId).classList.add('selected'); 
            setTimeout(() => changeNode(nextNode), 550);
        }

        function changeNode(n) { currentNode = n; boardEraserTransition(renderGame); }

        function showTheory() {
            boardEraserTransition(() => {
                const content = document.getElementById('card-content');
                content.innerHTML = `
                    <div id="theory-view" style="display:block; padding-bottom:20px;">
                        <div class="gold-glow-title">介子：最強的「接球遊戲」</div>
                        <div class="game-of-catch">
                            <div class="repel-wave" style="left:15%"></div>
                            <div class="player player-p">質子<br>(+)</div>
                            <div class="meson-ball"></div>
                            <div class="player player-n">中子<br>(0)</div>
                        </div>
                        <div class="theory-desc" id="chalk-box"></div>
                        <button class="btn btn-center" id="back-btn" style="opacity:0; transition:opacity 0.5s;" onclick="renderGame()">返回我的結局</button>
                    </div>
                `;
                const desc = "為什麼帶正電的質子在原子核裡不會彼此推開？湯川秀樹大膽預言：質子與中子之間，正在玩一場極速的「接球遊戲」。\n\n藉由不斷丟出一顆有質量的球（介子），在拋接的瞬間產生了巨大的強大拉力。這股拉力比電力強上一百倍，強行扣住了原子核，這就是萬物聯繫的終極真理。";
                executeChalkWritter(desc, "chalk-box", () => document.getElementById('back-btn').style.opacity = "1");
            });
        }

        // Three.js 3D 量子背景
        let scene, camera, renderer, particleSystem;
        function init3D() {
            const canvas = document.getElementById('webgl-canvas');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 1000);
            camera.position.z = 180;
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const particleCount = 2200;
            const pos = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount * 3; i++) pos[i] = (Math.random() - 0.5) * 450;
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ color: 0xf3cc83, size: 1.5, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending });
            particleSystem = new THREE.Points(geo, mat);
            scene.add(particleSystem);

            window.addEventListener('resize', () => { 
                camera.aspect = window.innerWidth / window.innerHeight; 
                camera.updateProjectionMatrix(); 
                renderer.setSize(window.innerWidth, window.innerHeight); 
            });
            animate();
        }
        function animate() {
            requestAnimationFrame(animate);
            particleSystem.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }

        window.onload = () => { renderGame(); init3D(); };
    </script>
</body>
</html>
