<head>

    <style>
        /* ==========================================
           1. 全域背景：完全復刻海報的深藍至炭黑漸層 + 粒子星點
           ========================================== */
        body {
            margin: 0;
            padding: 0;
            /* 海報標誌性的深藍黑到純黑的向心漸層 */
            background: radial-gradient(circle, #101a2d 0%, #0a0f18 70%, #05070b 100%);
            color: #cbd5e1;
            font-family: 'Noto Serif TC', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }

        /* 複刻海報背景：星芒與量子網絡浮水印 */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                /* 點綴微弱的金色與藍色粒子 */
                radial-gradient(circle at 20% 30%, rgba(142, 148, 242, 0.08) 1px, transparent 1px),
                radial-gradient(circle at 75% 15%, rgba(212, 163, 89, 0.06) 1px, transparent 1px),
                radial-gradient(circle at 40% 80%, rgba(142, 148, 242, 0.05) 2px, transparent 2px);
            background-size: 120px 120px, 180px 180px, 240px 240px;
            pointer-events: none;
            z-index: 0;
        }

        /* ==========================================
           2. 核心幾何邊框：完全復刻海報邊緣的金色雙線與菱形徽章
           ========================================== */
        .outer-border {
            position: fixed;
            top: 25px; left: 25px; right: 25px; bottom: 25px;
            border: 1px solid rgba(212, 163, 89, 0.25); /* 外層細金線 */
            pointer-events: none;
            z-index: 1;
        }
        .inner-border {
            position: fixed;
            top: 33px; left: 33px; right: 33px; bottom: 33px;
            border: 1px solid rgba(212, 163, 89, 0.15); /* 內層細金線 */
            pointer-events: none;
            z-index: 1;
        }
        /* 海報上下中心的古典幾何裝飾塊 */
        .border-deco-top {
            position: fixed; top: 21px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 12px; border: 1px solid rgba(212, 163, 89, 0.6);
            background-color: #0a0f18; rotate: 45deg; z-index: 2;
        }
        .border-deco-bottom {
            position: fixed; bottom: 21px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 12px; border: 1px solid rgba(212, 163, 89, 0.6);
            background-color: #0a0f18; rotate: 45deg; z-index: 2;
        }

        /* ==========================================
           3. 物理公式浮水印（背景幽靈文字）
           ========================================== */
        .bg-formulas {
            position: absolute;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: rgba(255, 255, 255, 0.03);
            pointer-events: none;
            user-select: none;
            z-index: 0;
        }
        #f1 { top: 10%; left: 10%; font-size: 32px; }
        #f2 { top: 15%; right: 15%; font-size: 28px; }
        #f3 { bottom: 15%; left: 12%; font-size: 26px; }
        #f4 { bottom: 12%; right: 10%; font-size: 36px; }

        /* ==========================================
           4. 遊戲主卡片：極簡透光、不干擾背景
           ========================================== */
        .game-container {
            width: 100%;
            max-width: 620px;
            background: rgba(10, 15, 24, 0.65); /* 半透明神祕藍黑 */
            backdrop-filter: blur(8px); /* 輕微毛玻璃 */
            border: 1px solid rgba(142, 148, 242, 0.15);
            border-radius: 16px;
            padding: 45px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(142, 148, 242, 0.05);
            transition: opacity 0.4s ease, transform 0.4s ease;
            box-sizing: border-box;
            z-index: 10;
            position: relative;
        }

        .fade { opacity: 0; transform: translateY(10px); }
        .show { opacity: 1; transform: translateY(0); }

        /* ==========================================
           5. 封面佈局與標題：完全復刻海報字體風格
           ========================================== */
        .cover-view { text-align: center; padding: 20px 0; }
        
        /* 復刻海報：黃金漸層發光字體 */
        .gold-glow-title {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 2px;
            /* 實現海報中的亮黃金漸層色 */
            background: linear-gradient(to bottom, #fff6df 0%, #f3cc83 50%, #d4a359 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* 精緻的發光字體特效 */
            filter: drop-shadow(0 0 12px rgba(212, 163, 89, 0.45));
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .cover-subtitle {
            font-size: 16px;
            color: #94a3b8;
            letter-spacing: 1px;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        /* 圖片樣式（與卡片融合） */
        .quiz-image {
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid rgba(212, 163, 89, 0.2);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
        }

        /* 題目文字：復刻海報黃金字體 */
        .question-text {
            font-size: 21px;
            font-weight: 500;
            line-height: 1.7;
            margin-bottom: 35px;
            background: linear-gradient(to bottom, #ffffff 0%, #f5d69f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(212, 163, 89, 0.2));
            text-align: left;
        }

        /* ==========================================
           6. 二選一選項按鈕：沉穩藍黑底 + 金色微光邊框
           ========================================== */
        .btn {
            display: block;
            width: 100%;
            padding: 18px 24px;
            margin-bottom: 16px;
            background-color: rgba(16, 24, 41, 0.85);
            border: 1px solid rgba(212, 163, 89, 0.25); /* 輕微金邊 */
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 16px;
            font-family: 'Noto Serif TC', serif;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }
        /* 懸停：亮藍色與金色交織發光 */
        .btn:hover {
            background-color: rgba(24, 37, 64, 0.95);
            border-color: #f3cc83;
            color: #ffffff;
            transform: translateX(5px);
            box-shadow: 0 0 15px rgba(142, 148, 242, 0.3);
        }

        /* 中心大按鈕（開始與重新挑戰） */
        .btn-center {
            text-align: center;
            background: linear-gradient(135deg, #f3cc83 0%, #d4a359 100%);
            color: #05070b;
            font-weight: 700;
            border: none;
            margin: 25px auto 0;
            max-width: 220px;
            filter: drop-shadow(0 4px 10px rgba(212, 163, 89, 0.3));
        }
        .btn-center:hover {
            background: linear-gradient(135deg, #fff6df 0%, #f3cc83 100%);
            color: #05070b;
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(212, 163, 89, 0.5);
        }

        /* 結局專用 */
        .ending-title {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(to bottom, #fff6df 0%, #f3cc83 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
            text-align: center;
            filter: drop-shadow(0 0 10px rgba(212, 163, 89, 0.4));
        }
        .ending-text {
            font-size: 16px;
            line-height: 1.9;
            color: #cbd5e1;
            text-align: justify;
            margin-bottom: 35px;
        }
    </style>
</head>

                        ${imgHtml}
                        <div class="question-text">${node.text}</div>
                        <div>${optionsHtml}</div>
                    `;
                }

                container.classList.remove('fade');
                container.classList.add('show');
            }, 300);
        }

        function changeNode(nextNode) {
            currentNode = nextNode;
            renderGame();
        }

        window.onload = renderGame;
    </script>
</body>
</html>
