<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湯川秀樹：探求者的思緒</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght=400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        /* 1. 背景與黑板設計 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Noto Serif TC', serif;
            background-color: #1a1a1e; /* 深石板色 */
            /* 模擬黑板質感與粉筆灰 */
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to right, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 80px 80px, 200px 200px;
            overflow: hidden;
            color: #f1f1f1;
        }

        /* 湯川勢公式背景浮水印 */
        #formula-container {
            position: absolute;
            bottom: 50px;
            right: 50px;
            opacity: 0.1;
            font-size: 40px;
            pointer-events: none;
            color: #ffffff;
            font-family: 'Roboto Mono', monospace;
        }

        /* 2. 遊戲主容器（毛玻璃質感） */
        .game-container {
            width: 90%;
            max-width: 600px;
            background: rgba(45, 45, 55, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .fade-in { opacity: 1; transform: translateY(0); }
        .fade-out { opacity: 0; transform: translateY(-20px); }

        /* 題目樣式 */
        h2 {
            font-size: 22px;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: left;
            border-left: 4px solid #8e94f2;
            padding-left: 15px;
        }

        /* 選項按鈕 */
        .options-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 18px 25px;
            border-radius: 12px;
            color: #ffffff;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            line-height: 1.4;
        }

        .btn:hover {
            background: rgba(142, 148, 242, 0.2);
            border-color: #8e94f2;
            transform: translateX(5px);
        }

        /* 結局標題 */
        .ending-title {
            font-size: 28px;
            font-weight: 700;
            color: #8e94f2;
            margin-bottom: 20px;
        }

        .ending-text {
            font-size: 18px;
            line-height: 1.8;
            text-align: left;
            color: #d1d1d1;
        }

        .restart-btn {
            margin-top: 30px;
            background: #8e94f2;
            color: #1a1a1e;
            font-weight: bold;
            text-align: center;
        }
        
        .restart-btn:hover {
            background: #767bc7;
            transform: scale(1.05);
        }

        /* 隱藏圖片容器 */
        #quiz-image {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="formula-container">
        V(r) = -g²(e^(-κr)/r)
    </div>

    <div class="game-container fade-in" id="game-ui">
        <img id="quiz-image" src="" alt="Quiz Visual">
        <h2 id="question-text">正在讀取時空檔案...</h2>
        <div class="options-group" id="options-group"></div>
    </div>

    <script>
        // 遊戲劇本資料庫
        const story = {
            1: {
                text: "你出生在富裕家庭裡過著優渥的生活，今天你的早餐想吃：",
                options: [
                    { text: "A. 進進堂的剛烤好的麵包配上冰咖啡", next: 2 },
                    { text: "B. 香氣四溢的土鍋炊飯配上紅味噌湯", next: 2 }
                ]
            },
            2: {
                text: "今天在學校唸書，發現書包裡還有空間，你打算帶著：",
                options: [
                    { text: "A. 最新一期泰晤士報", next: 3 },
                    { text: "B. 一小盒和菓子", next: 3 }
                ]
            },
            3: {
                text: "走在京都新風館的長廊上，你望向遠方的星空，此時你心中更嚮往的是？",
                options: [
                    { text: "A. 物質世界背後的終極理型與規律", next: 4, flag: "physics" },
                    { text: "B. 人與人之間感性交織的文學篇章", next: 4, flag: "humanities" }
                ]
            },
            4: {
                text: "你快要遲到了，在趕去上學路上遇到了一隻貓咪，你打算：",
                options: [
                    { text: "A. 不理它", next: 5 },
                    { text: "B. 有貓就要摸", next: 5 }
                ]
            },
            5: {
                text: "放學路上途經新開的喫茶館，於是你打算進去試試口味。你看了菜單，打算要點：",
                options: [
                    { text: "A. 濃郁醇香的抹茶", next: 6 },
                    { text: "B. 夢幻的冰淇淋蘇打", next: 6 }
                ]
            },
            6: {
                text: "在選擇大學專業時，你選擇攻讀：",
                options: [
                    { text: "A. 京都帝國大學物理學系", next: 7, flag: "science" },
                    { text: "B. 西洋文化學系及基礎現代文學系", next: 7, flag: "literature" }
                ]
            },
            7: {
                text: "今天實驗做到爆肝，進度落後，你打算：",
                options: [
                    { text: "A. 喝咖啡趕快把今天進度趕完", next: 8 },
                    { text: "B. 直接睡實驗室了", next: 8 }
                ]
            },
            8: {
                text: "好不容易畢業了，站在人生的交叉路口，你打算：",
                options: [
                    { text: "A. 投身機械工業", next: 9 },
                    { text: "B. 繼續攻讀博士", next: 9 }
                ]
            },
            9: {
                text: "1932年，你與湯川澄子結婚。在婚禮上，你們打算穿著：",
                options: [
                    { text: "A. 傳統日式白無垢及黑紋付羽織袴", next: 10, flag: "nobel" },
                    { text: "B. 西式蕾絲白紗及三件式西裝", next: 10, flag: "peace" }
                ]
            },
            10: {
                text: "你搭著路面電車回家，心裡在想著：",
                options: [
                    { text: "A. 明天早餐要吃什麼", next: 11 },
                    { text: "B. 等等要不要去喝個酒", next: 11 }
                ]
            },
            11: {
                text: "你在32歲擔任京都帝國大學教授。回家路上雨下很大，於是你打算：",
                options: [
                    { text: "A. 搭乘電車回家", next: 12 },
                    { text: "B. 睡在實驗室裡", next: 12 }
                ]
            },
            12: {
                text: "但今天特別閒，打算跟妻子湯川澄子來場說走就走的約會，你打算：",
                options: [
                    { text: "A. 跟妻子去百貨公司逛衣服", next: "result" },
                    { text: "B. 到鴨川河畔一起看夕陽", next: "result" }
                ]
            }
        };

        // 結局資料庫
        const results = {
            A: {
                title: "【結局 A：介子之父，真理的先驅者】",
                text: "你完美複製了湯川秀樹的人生。你在京都帝國大學深耕，於 1935 年提出了介子理論，並在 1949 年獲得了日本首個諾貝爾物理學獎。你的名字將與公式一同刻在科學黑板上，成為永恆。"
            },
            B: {
                title: "【結局 B：靜謐的京都教授】",
                text: "你選擇了學術，但也珍視家庭。你成為了一位受人尊敬的京都大學教授，雖然沒有諾貝爾獎的光環，但你與妻子澄子在鴨川畔度過了安穩的一生，為學界培育無數英才。"
            },
            C: {
                title: "【結局 C：昭和浪漫的文豪】",
                text: "你偏離了科學，走向了文學。你以溫潤的筆觸描寫京都的四季與人心，成為了昭和時代著名的文豪。你的文字像抹茶般濃郁，讓人們在混亂的年代找到了心靈的棲息地。"
            },
            D: {
                title: "【結局 D：享受生活的京都士紳】",
                text: "你對世界充滿好奇，但不願受拘束。你過著優渥且有質感的日式生活，偶爾研究機械，偶爾品味甜點。對你而言，幸福不在於公式的解答，而是在進進堂喝咖啡的每個當下。"
            }
        };

        let currentStep = 1;
        let flags = [];

        function renderStep() {
            const ui = document.getElementById('game-ui');
            ui.classList.add('fade-out');

            setTimeout(() => {
                const data = story[currentStep];
                document.getElementById('question-text').innerText = data.text;
                
                const btnGroup = document.getElementById('options-group');
                btnGroup.innerHTML = '';

                data.options.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'btn';
                    b.innerText = opt.text;
                    b.onclick = () => {
                        if (opt.flag) flags.push(opt.flag);
                        
                        if (opt.next === "result") {
                            showResult();
                        } else {
                            currentStep = opt.next;
                            renderStep();
                        }
                    };
                    btnGroup.appendChild(b);
                });

                ui.classList.remove('fade-out');
                ui.classList.add('fade-in');
            }, 400);
        }

        function showResult() {
            const ui = document.getElementById('game-ui');
            ui.classList.add('fade-out');

            setTimeout(() => {
                let res;
                // 後台條件判定：根據第 3、6、9 題的隱藏 Flag
                if (flags.includes("physics") && flags.includes("science") && flags.includes("nobel")) {
                    res = results.A;
                } else if (flags.includes("physics") || flags.includes("science")) {
                    res = results.B;
                } else if (flags.includes("literature")) {
                    res = results.C;
                } else {
                    res = results.D;
                }

                ui.innerHTML = `
                    <div class="ending-title">${res.title}</div>
                    <div class="ending-text">${res.text}</div>
                    <button class="btn" style="text-align:center; background:#8e94f2; color:#1a1a1e; font-weight:bold;" onclick="location.reload()">重新探索人生</button>
                `;
                ui.classList.remove('fade-out');
                ui.classList.add('fade-in');
            }, 400);
        }

        window.onload = renderStep;
    </script>
</body>
</html>
