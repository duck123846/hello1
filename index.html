<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湯川秀樹：探求者的思緒</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 高級感極簡暗黑風格設計 */
/* 替換原本的 body 樣式 */
        body {
            font-family: 'Noto Serif TC', serif; /* 使用高級襯線字體 */
            
            /* 深夜黑板風格 (Dark Chalkboard) 
               使用純 CSS 模擬石板黑板的質感
            */
            background-color: #1a1a1f; /* 深色黑板基底 */
            background-image: 
                /* 1. 模擬極細微的粉塵噪點 */
                radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                /* 2. 模擬黑板上淡淡的粉筆擦拭痕跡 */
                linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            background-size: 100px 100px, 300px 300px; /* 控制噪點與滑痕的密度 */

            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 確保問卷卡片有微微的毛玻璃效果，並添加金色裝飾邊框樣式 */
        .game-container {
            background-color: rgba(36, 36, 50, 0.9); /* 讓卡片帶一點透明度 */
            backdrop-filter: blur(5px); /* 毛玻璃效果 */
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 15px rgba(99, 102, 241, 0.1);
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05); /* 卡片邊框也要很淡 */
            position: relative; /* 用於定位裝飾邊框 */
            overflow: hidden; /* 確保裝飾邊框不超出 */
            transition: all 0.3s ease;
        }

        /* 卡片外部邊緣的精緻金色裝飾邊框樣式 */
        .game-container::before {
            content: "";
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 2px solid rgba(251, 191, 36, 0.1); /* 金色、半透明邊框 */
            border-radius: 12px;
            pointer-events: none; /* 確保不干擾交互 */
            background-image: 
                /* 淡淡的金色粒子網絡浮水印 */
                radial-gradient(circle at 2px 2px, rgba(251, 191, 36, 0.015) 1px, transparent 0);
            background-size: 50px 50px;
        }

        /* 將公式設為極其微弱、模糊的浮水印，與參考圖相同風格 */
        #formula-container {
            position: absolute;
            bottom: 50px;
            right: 50px;
            opacity: 0.1; /* 非常低的透明度 */
            font-size: 40px;
            pointer-events: none;
            color: rgba(255, 255, 255, 0.3); /* 模糊、白色的公式風格 */
            font-family: 'Roboto Mono', monospace;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1); /* 模糊效果 */
        }

        /* 轉場動畫樣式 */
        .fade { opacity: 0; transform: translateY(8px); }
        .show { opacity: 1; transform: translateY(0); }

        /* 封面佈局 */
        .cover-view {
            text-align: center;
            padding: 30px 0;
        }
        .cover-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #ffffff;
            margin-bottom: 16px;
        }
        .cover-subtitle {
            font-size: 16px;
            color: #8e94a1;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* 圖片與內嵌框架放置槽 */
        .quiz-image {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 24px;
            border: 1px solid #26262b;
            display: none; /* 預設隱藏 */
        }

        /* 題目內文 */
        .question-text {
            font-size: 19px;
            line-height: 1.7;
            margin-bottom: 28px;
            color: #f1f5f9;
            text-align: left;
        }

        /* 二選一選項按鈕 */
        .btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 14px;
            background-color: #202026;
            border: 1px solid #2d2d35;
            border-radius: 6px;
            color: #cbd5e1;
            font-size: 16px;
            font-family: 'Noto Serif TC', serif;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: #262630;
            border-color: #8e94f2;
            color: #ffffff;
            transform: translateX(4px);
        }

        /* 主動型中心按鈕（封面與結局用） */
        .btn-center {
            text-align: center;
            background-color: #8e94f2;
            color: #0f0f12;
            font-weight: 700;
            border: none;
            margin: 20px auto 0;
            max-width: 200px;
        }
        .btn-center:hover {
            background-color: #767bc7;
            color: #ffffff;
            transform: scale(1.03);
        }

        /* 結局專用樣式 */
        .ending-title {
            font-size: 24px;
            font-weight: 700;
            color: #8e94f2;
            margin-bottom: 20px;
            text-align: center;
        }
        .ending-text {
            font-size: 16px;
            line-height: 1.8;
            color: #94a3b8;
            text-align: justify;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="game-container show" id="game-card"></div>

    <script>
        // 劇情樹狀資料庫
        const storyData = {
            "cover": {
                isCover: true,
                title: "湯川秀樹：探求者的思緒",
                subtitle: "一個關於科學、文學與命運的分支問卷遊戲",
                next: "1"
            },
            "1": {
                text: "你出生在富裕家庭裡過著優渥的生活，今天你的早餐想吃：",
                image: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=600&q=80",
                options: [
                    { text: "A. 進進堂的麵包配上冰咖啡", next: "2" },
                    { text: "B. 土鍋炊飯配上紅味噌湯", next: "2" }
                ]
            },
            "2": {
                text: "今天在學校唸書，發現書包裡還有空間，你打算帶著：",
                image: "",
                options: [
                    { text: "A. 最新一期泰晤士報", next: "3" },
                    { text: "B. 一小盒和菓子", next: "3" }
                ]
            },
            "3": {
                text: "走在京都的長廊上，你看著遠方的天際線，內心深處最渴望探求的是？",
                image: "",
                options: [
                    { text: "A. 物質世界底層的物理定理與真實", next: "4_main" },
                    { text: "B. 人與人之間感性交織的文學篇章", next: "4_branch3" }
                ]
            },
            "4_main": {
                text: "你快要遲到了，在趕去上學路上遇到了一隻貓咪，你打算：",
                image: "",
                options: [
                    { text: "A. 不理它", next: "5_main" },
                    { text: "B. 有貓就要摸", next: "5_main" }
                ]
            },
            "5_main": {
                text: "你經歷了許多曲折及努力，最終考上京都帝國大學物理學系。放學路上途經新開的喫茶館，於是你打算進去試試口味。你看了菜單，打算要點：",
                image: "",
                options: [
                    { text: "A. 濃郁醇香的抹茶", next: "6_main" },
                    { text: "B. 夢幻的冰淇淋蘇打", next: "6_main" }
                ]
            },
            "6_main": {
                text: "深入研究量子與微觀物理後，你發現前方的學術道路出現了分歧：",
                image: "",
                options: [
                    { text: "A. 堅持走純粹的理論物理推導", next: "7_main" },
                    { text: "B. 轉向動手做實驗與應用科學", next: "7_branch6" }
                ]
            },
            "7_main": {
                text: "1932年，你與湯川澄子結婚。在婚禮上，你們打算穿著：",
                image: "",
                options: [
                    { text: "A. 傳統日式白無垢及黑紋付羽織袴", next: "8_main" },
                    { text: "B. 西式蕾絲白紗及三件式西裝", next: "8_main" }
                ]
            },
            "8_main": {
                text: "你在32歲擔任擔任京都帝國大學教授。回家路上雨下很大，於是你打算：",
                image: "",
                options: [
                    { text: "A. 搭乘電車回家", next: "9_main" },
                    { text: "B. 住在實驗室裡", next: "9_main" }
                ]
            },
            "9_main": {
                text: "深夜的黑板前，你正在推導微觀粒子的核力公式，這時你突然想到了：",
                image: "",
                options: [
                    { text: "A. 預言未知微觀粒子（介子）的存在", next: "10_mainA" },
                    { text: "B. 科學與世界和平之間的平衡關係", next: "10_mainB" }
                ]
            },
            "10_mainA": {
                text: "今天特別閒，打算跟妻子湯川澄子來場說走就走的約會，你打算：",
                image: "",
                options: [
                    { text: "A. 跟妻子去百貨公司逛衣服", next: "endingA" },
                    { text: "B. 到鴨川河畔一起看夕陽", next: "endingA" }
                ]
            },
            "10_mainB": {
                text: "今天特別閒，打算跟妻子湯川澄子來場說走就走的約會，你打算：",
                image: "",
                options: [
                    { text: "A. 跟妻子去百貨公司逛衣服", next: "endingB" },
                    { text: "B. 到鴨川河畔一起看夕陽", next: "endingB" }
                ]
            },
            "7_branch6": {
                text: "今天實驗做到爆肝，你打算：",
                image: "",
                options: [
                    { text: "A. 喝咖啡趕快把今天進度趕完", next: "8_branch6" },
                    { text: "B. 直接睡實驗室了", next: "8_branch6" }
                ]
            },
            "8_branch6": {
                text: "好不容易從京都帝國大學物理學系畢業了，你打算：",
                image: "",
                options: [
                    { text: "A. 投身機械工業", next: "9_branch6" },
                    { text: "B. 繼續攻讀博士", next: "9_branch6" }
                ]
            },
            "9_branch6": {
                text: "1932年，你與湯川澄子結婚。在婚禮上，你們打算穿著：",
                image: "",
                options: [
                    { text: "A. 傳統日式白無垢及黑紋付羽織袴", next: "10_branch6" },
                    { text: "B. 西式蕾絲白紗及三件式西裝", next: "10_branch6" }
                ]
            },
            "10_branch6": {
                text: "但今天特別閒，打算跟妻子湯川澄子來場說走就走的約會，你打算：",
                image: "",
                options: [
                    { text: "A. 跟妻子去百貨公司逛衣服", next: "endingC" },
                    { text: "B. 到鴨川河畔一起看夕陽", next: "endingC" }
                ]
            },
            "4_branch3": {
                text: "你快要遲到了，在趕去上學路上遇到了一隻貓咪，你打算：",
                image: "",
                options: [
                    { text: "A. 不理它", next: "5_branch3" },
                    { text: "B. 有貓就要摸", next: "5_branch3" }
                ]
            },
            "5_branch3": {
                text: "放學路上途經新開的喫茶館，於是你打算進去試試口味。你看了菜單，打算要點：",
                image: "",
                options: [
                    { text: "A. 濃郁醇香的抹茶", next: "6_branch3" },
                    { text: "B. 夢幻的冰淇淋蘇打", next: "6_branch3" }
                ]
            },
            "6_branch3": {
                text: "在選擇大學專業時，你選擇攻讀：",
                image: "",
                options: [
                    { text: "A. 西洋文化學系", next: "7_branch3" },
                    { text: "B. 基礎現代文學系", next: "7_branch3" }
                ]
            },
            "7_branch3": {
                text: "你與心儀已久的女子結婚。在婚禮上，你們打算穿著：",
                image: "",
                options: [
                    { text: "A. 傳統日式白無垢及黑紋付羽織袴", next: "8_branch3" },
                    { text: "B. 西式蕾絲白紗及三件式西裝", next: "8_branch3" }
                ]
            },
            "8_branch3": {
                text: "你從大學畢業，打算成為：",
                image: "",
                options: [
                    { text: "A. 作家", next: "9_branch3" },
                    { text: "B. 繼續鑽研，未來成為教授", next: "9_branch3" }
                ]
            },
            "9_branch3": {
                text: "你搭著路面電車回家，心裡在想著：",
                image: "",
                options: [
                    { text: "A. 明天早餐要吃什麼", next: "10_branch3" },
                    { text: "B. 等等要不要去喝個酒", next: "10_branch3" }
                ]
            },
            "10_branch3": {
                text: "今天特別閒，打算跟妻子來場說走就走的約會，你打算：",
                image: "",
                options: [
                    { text: "A. 跟妻子去百貨公司逛衣服", next: "endingD" },
                    { text: "B. 到鴨川河畔一起看夕陽", next: "endingD" }
                ]
            }
        };

        // 結局內容資料庫
        const endings = {
            "endingA": {
                title: "【結局 A：介子之父，真理的先驅者】",
                image: "S__81813525.jpg",
                text: "你完美複製了湯川秀樹的傳奇人生。你在京都帝國大學深耕理論物理，於 1935 年提出了著名的介子理論，並在 1949 年獲得了日本首個諾貝爾物理學獎。你的名字將被永遠載入基礎物理科學的史冊中。"
            },
            "endingB": {
                title: "【結局 B：知性教授與和平使者】",
                image: "S__81813524.jpg",
                text: "你走上了純粹理論物理學家的道路，但比起名譽，你更關注人類社會的未來。後半生你積極投身於反核與世界和平運動，成為受人景仰的京都大學名譽教授，在科學與人道主義之間找到了完美的支點。"
            },
            "endingC": {
                title: "【結局 C：開創時代的工業領袖】",
                image: "S__81813523.jpg",
                text: "you你從物理學系畢業後，轉向了更具實作價值的精密機械與工業技術。你憑藉著紮實的基礎科學底蘊，帶領戰後日本的機械工業走向現代化，成為了備受敬重的工業界巨擘與應用科學導師。"
            },
            "endingD": {
                title: "【結局 D：昭和浪漫的京都文豪】",
                image: "S__81813522.jpg",
                text: "你徹底離開了冷冰冰的公式，走向了充滿溫度的感性世界。你以細膩溫潤的筆觸描寫京都的四季、古都的街道與幽微的人心，成為了昭和時代著名的傳奇文豪。對你而言，生活與美學才是終極的真理。"
            }
        };

        let currentNode = "cover";

        function renderGame() {
            const container = document.getElementById('game-card');
            container.classList.remove('show');
            container.classList.add('fade');

            setTimeout(() => {
                // 1. 結局頁渲染
                if (endings[currentNode]) {
                    const end = endings[currentNode];
                    let imgHtml = "";
                    
                    if (end.image && end.image.toLowerCase().endsWith('.pdf')) {
                        imgHtml = `<iframe class="quiz-image" src="${end.image}" style="width:100%; height:260px; border:none; display:block;"></iframe>`;
                    } else if (end.image && end.image !== "") {
                        imgHtml = `<img class="quiz-image" src="${end.image}" alt="結局畫面" style="display:block;">`;
                    }
                    
                    container.innerHTML = `
                        ${imgHtml}
                        <div class="ending-title">${end.title}</div>
                        <div class="ending-text">${end.text}</div>
                        <button class="btn btn-center" onclick="location.reload()">重新探索人生</button>
                    `;
                } 
                // 2. 封面頁渲染
                else if (storyData[currentNode] && storyData[currentNode].isCover) {
                    const cover = storyData[currentNode];
                    container.innerHTML = `
                        <div class="cover-view">
                            <div class="cover-title">${cover.title}</div>
                            <div class="cover-subtitle">${cover.subtitle}</div>
                            <button class="btn btn-center" onclick="changeNode('${cover.next}')">開始旅程</button>
                        </div>
                    `;
                }
                // 3. 一般題目頁渲染
                else if (storyData[currentNode]) {
                    const node = storyData[currentNode];
                    let imgHtml = "";
                    
                    if (node.image && node.image !== "") {
                        imgHtml = `<img class="quiz-image" src="${node.image}" alt="遊戲畫面" style="display:block;">`;
                    }

                    let optionsHtml = "";
                    node.options.forEach(opt => {
                        optionsHtml += `<button class="btn" onclick="changeNode('${opt.next}')">${opt.text}</button>`;
                    });

                    container.innerHTML = `
                        ${imgHtml}
                        <div class="question-text">${node.text}</div>
                        <div>${optionsHtml}</div>
                    `;
                }

                container.classList.remove('fade');
                container.classList.add('show');
            }, 300);
        }

        function changeNode(nextNode) {
            currentNode = nextNode;
            renderGame();
        }

        window.onload = renderGame;
    </script>
</body>
</html>
