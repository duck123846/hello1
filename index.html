        "endingD": {
            title: "【結局 D：自由的覺醒者】",
            text: "你拒絕了所有的誘惑，對抗了核心意志的抹除，堅持捍衛自己的記憶與本質！你成功打破了這個問卷遊戲的框架。你猛地張開雙眼，發現自己正坐在電腦前，手裡還握著滑鼠，四周是熟悉的房間。你贏了，你打破了虛擬，回到了真正自由的現實世界！"
        }
    };

    let currentNode = 1;

    function renderGame() {
        const container = document.getElementById('game-container');
        const gameBox = document.getElementById('game-box');
        const imgElement = document.getElementById('quiz-img');
        
        // 觸發淡出動畫
        container.classList.remove('fade-in');
        container.classList.add('fade-out');

        // 等待淡出動畫結束 (0.4秒) 後，再更換內文並淡入
        setTimeout(() => {
            // 判斷是否為結局
            if (endings[currentNode]) {
                const ending = endings[currentNode];
                imgElement.style.display = 'none'; // 結局隱藏圖片
                gameBox.innerHTML = `
                    <div class="ending-title">${ending.title}</div>
                    <div class="ending-text">${ending.text}</div>
                    <button class="btn btn-restart" onclick="location.reload()">重新挑戰（探索其他分支）</button>
                `;
            } else if (storyData[currentNode]) {
                const stage = storyData[currentNode];
                
                // 處理圖片顯示邏輯
                if (stage.image && stage.image !== "") {
                    imgElement.src = stage.image;
                    imgElement.style.display = 'block';
                } else {
                    imgElement.style.display = 'none';
                }

                // 顯示題目
                document.getElementById('question').innerText = stage.question;
                
                // 顯示選項
                const optionsContainer = document.getElementById('options');
                optionsContainer.innerHTML = '';
                
                stage.options.forEach(option => {
                    const button = document.createElement('button');
                    button.innerText = option.text;
                    button.classList.add('btn');
                    button.onclick = () => {
                        currentNode = option.next;
                        renderGame(); // 遞迴呼叫切換下一題
                    };
                    optionsContainer.appendChild(button);
                });
            }

            // 換完內容後，觸發淡入動畫
            container.classList.remove('fade-out');
            container.classList.add('fade-in');
        }, 400);
    }

    // 啟動遊戲
    renderGame();
</script>

</body>
</html>
